<!DOCTYPE html>
<html>
<head>
    <title>Bluff Button</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; background-color: #f0f0f0; }
        #box { background: white; border: 2px solid #333; padding: 30px; display: inline-block; border-radius: 15px; }
        #phrase { font-size: 20px; margin-bottom: 20px; color: #333; max-width: 300px; }
        button { font-size: 18px; padding: 10px 25px; cursor: pointer; background-color: #ff4757; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #ff6b81; }
    </style>
</head>
<body>

    <h1>Bluff Button</h1>

    <div id="box">
        <div id="phrase">Can you find the coordinates?</div>
        <button id="mainButton" onclick="getPhrase()">Press Me</button>
    </div>

    <script>
        let clicks = 0;
        const bluffs = [
            "Sorry, I'm just bluffing, but press the button again!",
            "Ha, tricked you again. Trust me, press it again.",
            "Keep trying!",
            "Bluffing is my specialty.",
            "Oops! Not yet!",
            "Almost! Press again for a real surprise.",
            "Haha, fooled you!",
            "Bluff alert! Try once more.",
            "Not quite! The coordinates are hiding.",
            "Patience! Press the button again.",
            "Just kidding! Keep pressing.",
            "Fooled you again! Give it another go.",
            "Keep your hopes high!",
            "Bluff master at work!",
            "One more press might do it..."
        ];

        function getPhrase() {
            clicks++;
            const display = document.getElementById('phrase');
            const btn = document.getElementById('mainButton');
            
            // Random chance after 10 clicks
            if (clicks > 10 && Math.random() > 0.8) {
                display.innerHTML = "<b style='color:green'>Congrats!<br>N42° 01.143 W88° 15.556</b>";
                btn.style.display = 'none'; // Button hides once solved
            } else {
                const randomIndex = Math.floor(Math.random() * bluffs.length);
                display.innerText = bluffs[randomIndex];
            }
        }
    </script>

</body>
</html>
